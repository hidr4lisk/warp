<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>WARP — Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Major+Mono+Display&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{--g1:#39d353;--g2:#b6ff3a;--g3:#0b3d1a;--sage:#98B4A6;--mono:'JetBrains Mono',monospace;--disp:'Major Mono Display',monospace;--vt:'VT323',monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;overflow:hidden}
  body{min-height:100dvh;display:flex;align-items:center;justify-content:center}
  #poster{position:relative;width:1080px;height:1350px;flex:0 0 auto;transform-origin:center center;
    background:#050705;overflow:hidden;color:#ececec;font-family:var(--mono);
    background-image:linear-gradient(rgba(57,211,83,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(57,211,83,.05) 1px,transparent 1px);background-size:46px 46px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px 80px;text-align:center}
  .scan{position:absolute;inset:0;z-index:5;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(0,0,0,.16) 0,rgba(0,0,0,.16) 2px,transparent 2px,transparent 5px);opacity:.5}
  .vig{position:absolute;inset:0;z-index:5;pointer-events:none;box-shadow:inset 0 0 380px 80px rgba(0,0,0,.8)}
  .content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:0}

  .eyebrow{font-family:var(--vt);font-size:34px;letter-spacing:.34em;text-transform:uppercase;color:var(--sage);margin-bottom:52px}

  /* portal */
  .portal{position:relative;width:300px;height:300px;border-radius:50%;overflow:hidden;isolation:isolate;margin-bottom:64px;
    box-shadow:0 0 0 3px rgba(57,211,83,.45),0 0 120px rgba(57,211,83,.6)}
  .portal i{position:absolute;border-radius:50%}
  .r1{inset:-25%;background:conic-gradient(from 35deg,var(--g3),var(--g1),var(--g2),var(--g1),var(--g3),var(--g1),var(--g2),var(--g3));filter:blur(12px)}
  .r2{inset:5%;mix-blend-mode:screen;filter:blur(7px);background:conic-gradient(from 200deg,transparent,var(--g2),transparent,var(--g1),transparent)}
  .core{inset:27%;background:radial-gradient(circle,rgba(4,12,6,.97) 36%,rgba(57,211,83,.2));box-shadow:inset 0 0 60px rgba(182,255,58,.55)}

  .tag{font-family:var(--disp);font-size:104px;line-height:1.05;color:var(--g2);text-shadow:0 0 50px rgba(57,211,83,.6);letter-spacing:.01em;margin-bottom:18px}
  .sub{font-size:34px;color:var(--sage);letter-spacing:.04em;margin-bottom:70px}

  .rule{width:120px;height:2px;background:var(--g1);box-shadow:0 0 14px var(--g1);margin-bottom:50px;opacity:.8}

  .wm{font-family:var(--disp);font-size:58px;color:#fff;letter-spacing:.02em;display:inline-flex;align-items:center;gap:.4ch;margin-bottom:26px}
  .wm .v{font-family:var(--vt);font-size:.4em;color:var(--g2);border:2px solid var(--g2);border-radius:7px;padding:0 .35em}
  .url{font-family:var(--vt);font-size:42px;color:var(--g2);letter-spacing:.04em}
  .at{font-family:var(--vt);font-size:36px;color:var(--sage);margin-top:6px}
  .by{position:absolute;bottom:54px;left:0;right:0;z-index:10;text-align:center;font-size:26px;color:var(--sage);letter-spacing:.06em}
  .by b{color:#ececec;font-weight:700}
</style>
</head>
<body>
<div id="poster">
  <div class="scan"></div><div class="vig"></div>
  <div class="content">
    <div class="eyebrow" id="eyebrow">cifrado · efímero · sin rastro</div>
    <div class="portal"><i class="r1"></i><i class="r2"></i><i class="core"></i></div>
    <div class="tag" id="tag">El futuro<br>es privado.</div>
    <div class="sub" id="sub">P2P efímero, en tu navegador.</div>
    <div class="rule"></div>
    <div class="wm">Hidr4lisk_WARP<span class="v">v3</span></div>
    <div class="url">hidr4lisk.github.io/warp</div>
    <div class="at">@hidralisk.online</div>
  </div>
  <div class="by" id="by">Desarrollado por <b>Federico Furgiuele</b></div>
</div>
<script>
  const L=new URLSearchParams(location.search).get('lang')||'es';
  if(L==='en'){ document.documentElement.lang='en';
    document.getElementById('eyebrow').textContent='encrypted · ephemeral · no trace';
    document.getElementById('tag').innerHTML='The future<br>is private.';
    document.getElementById('sub').textContent='Ephemeral P2P, right in your browser.';
    document.getElementById('by').innerHTML='Developed by <b>Federico Furgiuele</b>'; }
  function fit(){document.getElementById('poster').style.transform='scale('+Math.min(innerWidth/1080,innerHeight/1350)+')';}
  addEventListener('resize',fit);fit();
</script>
</body>
</html>
