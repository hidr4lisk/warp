<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>WARP v3 — Reel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Major+Mono+Display&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --g1:#39d353; --g2:#b6ff3a; --g3:#0b3d1a; --sage:#98B4A6;
    --mono:'JetBrains Mono',monospace; --disp:'Major Mono Display',monospace; --vt:'VT323',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;overflow:hidden}
  body{min-height:100dvh;display:flex;align-items:center;justify-content:center}
  /* el stage es 1080×1920 fijo y se escala a la pantalla (a 1080×1920 escala = 1, no afecta la grabación) */
  #stage{position:relative;width:1080px;height:1920px;flex:0 0 auto;transform-origin:center center;
    background:#050705;overflow:hidden;font-family:var(--mono);color:#ececec}
  #rain{position:absolute;inset:0;z-index:0}
  .scan{position:absolute;inset:0;z-index:40;pointer-events:none;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,.16) 0,rgba(0,0,0,.16) 2px,transparent 2px,transparent 5px);opacity:.5}
  .vig{position:absolute;inset:0;z-index:41;pointer-events:none;box-shadow:inset 0 0 420px 80px rgba(0,0,0,.85)}
  #flash{position:absolute;inset:0;z-index:45;background:var(--g2);opacity:0;pointer-events:none}

  .scene{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 120px;opacity:0;transform:translateY(26px);
    transition:opacity .45s ease,transform .45s cubic-bezier(.16,1,.3,1)}
  .scene.on{opacity:1;transform:translateY(0)}
  .scene.off{opacity:0;transform:translateY(-22px);transition:opacity .3s ease,transform .3s ease}

  .kicker{font-family:var(--vt);font-size:30px;letter-spacing:.34em;text-transform:uppercase;color:var(--sage);margin-bottom:34px}
  .line{font-size:54px;line-height:1.32;font-weight:500;letter-spacing:.01em}
  .line.sm{font-size:42px;color:var(--sage)}
  .hl{color:var(--g2);text-shadow:0 0 24px rgba(57,211,83,.7)}
  .big{font-size:72px;font-weight:800;line-height:1.2}

  /* wordmark */
  .wm{font-family:var(--disp);font-size:104px;color:#fff;letter-spacing:.02em;position:relative;display:inline-block}
  .wm .v{font-family:var(--vt);font-size:.3em;color:var(--g2);border:2px solid var(--g2);border-radius:8px;padding:0 .3em;margin-left:.2em;vertical-align:middle}
  .glitch::before,.glitch::after{content:attr(data-t);position:absolute;left:0;top:0;width:100%;clip-path:inset(0 0 0 0)}
  .glitch.go::before{color:#37d6d0;animation:gA .5s steps(2) 1}
  .glitch.go::after{color:var(--g2);animation:gB .5s steps(2) 1}
  @keyframes gA{0%{transform:translate(-8px,0);opacity:.8}50%{transform:translate(6px,2px)}100%{opacity:0;transform:none}}
  @keyframes gB{0%{transform:translate(8px,0);opacity:.8}50%{transform:translate(-6px,-2px)}100%{opacity:0;transform:none}}

  /* QR */
  .qrbox{position:relative;width:380px;height:380px;background:#cfe3d8;border-radius:22px;padding:22px;
    box-shadow:0 0 60px rgba(57,211,83,.5)}
  #qrgrid{width:100%;height:100%;display:grid;gap:0}
  #qrgrid i{background:#0a0a0a}
  .qrlogo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#0a0a0a;color:var(--g2);
    font-weight:800;font-size:30px;padding:.3em .55em;border-radius:8px;border:4px solid #cfe3d8;white-space:nowrap}

  /* peers */
  .peers{display:flex;gap:60px;margin-bottom:40px}
  .peer{display:flex;flex-direction:column;align-items:center;gap:14px;opacity:.25;transition:opacity .4s}
  .peer.on{opacity:1}
  .peer .dot{width:26px;height:26px;border-radius:50%;background:var(--g1);box-shadow:0 0 22px var(--g1)}
  .peer .nm{font-family:var(--vt);font-size:30px;color:var(--sage)}
  .phone{width:120px;height:200px;border:3px solid var(--sage);border-radius:18px;display:flex;align-items:center;justify-content:center}
  .phone .scr{width:80%;height:86%;border-radius:8px;background:radial-gradient(circle,rgba(57,211,83,.25),rgba(0,0,0,.6))}

  /* PORTAL */
  .portal{position:relative;width:440px;height:440px;border-radius:50%;overflow:hidden;isolation:isolate;
    box-shadow:0 0 0 3px rgba(57,211,83,.4),0 0 80px rgba(57,211,83,.55);transition:transform .6s,box-shadow .6s}
  .portal .r1,.portal .r2,.portal .core{position:absolute;border-radius:50%}
  .portal .r1{inset:-25%;background:conic-gradient(from 0deg,var(--g3),var(--g1),var(--g2),var(--g1),var(--g3),var(--g1),var(--g2),var(--g3));filter:blur(14px);animation:spin 5s linear infinite}
  .portal .r2{inset:5%;mix-blend-mode:screen;filter:blur(8px);background:conic-gradient(from 180deg,transparent,var(--g2),transparent,var(--g1),transparent);animation:spin 3s linear infinite reverse}
  .portal .core{inset:27%;background:radial-gradient(circle,rgba(4,12,6,.97) 36%,rgba(57,211,83,.2));box-shadow:inset 0 0 60px rgba(182,255,58,.5)}
  .portal.roar{transform:scale(1.12);box-shadow:0 0 0 4px var(--g2),0 0 160px rgba(182,255,58,.9)}
  .portal.roar .r1{animation-duration:1.6s}
  @keyframes spin{to{transform:rotate(360deg)}}
  .pfile{position:absolute;z-index:12;left:50%;top:14%;transform:translateX(-50%);font-family:var(--vt);font-size:34px;color:var(--g2);
    text-shadow:0 0 14px var(--g1);opacity:0}
  .pfile.go{animation:suck 1.7s ease-in forwards}
  @keyframes suck{0%{opacity:1;top:8%;transform:translateX(-50%) scale(1)}70%{opacity:1}100%{opacity:0;top:50%;transform:translateX(-50%) scale(.1)}}
  .recv{position:absolute;z-index:12;left:50%;bottom:12%;transform:translateX(-50%);font-family:var(--vt);font-size:38px;color:var(--g2);opacity:0}
  .recv.go{animation:pop .5s ease 1.7s forwards}
  @keyframes pop{from{opacity:0;transform:translateX(-50%) scale(.6)}to{opacity:1;transform:translateX(-50%) scale(1)}}

  .url{font-family:var(--vt);font-size:38px;color:var(--g2);margin-top:30px;letter-spacing:.04em}
  .at{font-family:var(--vt);font-size:32px;color:var(--sage);margin-top:8px}
  .by{font-size:34px;color:var(--sage);letter-spacing:.1em}
  .byname{font-family:var(--disp);font-size:64px;color:#fff;margin-top:24px}
  .markmini{font-family:var(--disp);font-size:30px;color:var(--g2);margin-bottom:50px;letter-spacing:.04em}
  .progress{position:absolute;left:0;bottom:0;height:6px;background:var(--g1);width:0;z-index:50;box-shadow:0 0 12px var(--g1)}
</style>
</head>
<body>
<div id="stage">
  <canvas id="rain"></canvas>
  <div class="scan"></div>
  <div class="vig"></div>
  <div id="flash"></div>
  <div class="progress" id="prog"></div>

  <!-- 1 wordmark -->
  <div class="scene" id="s1">
    <div class="wm glitch" id="wm" data-t="Hidr4lisk_WARP">Hidr4lisk_WARP<span class="v">v3</span></div>
    <div class="kicker" id="t1" style="margin-top:40px;margin-bottom:0"></div>
  </div>
  <!-- 2 -->
  <div class="scene" id="s2"><div class="line" id="t2a"></div><div class="line sm" id="t2b" style="margin-top:18px"></div></div>
  <!-- 3 QR -->
  <div class="scene" id="s3">
    <div class="qrbox"><div id="qrgrid"></div><div class="qrlogo">Hidr4lisk_</div></div>
    <div class="line" id="t3a" style="margin-top:54px"></div><div class="line sm" id="t3b" style="margin-top:14px"></div>
  </div>
  <!-- 4 peers -->
  <div class="scene" id="s4">
    <div class="peers" id="peers2">
      <div class="peer on"><div class="phone"><div class="scr"></div></div><div class="dot"></div><div class="nm">vos</div></div>
      <div class="peer" id="p2b"><div class="phone"><div class="scr"></div></div><div class="dot"></div><div class="nm">peer</div></div>
    </div>
    <div class="line" id="t4a"></div><div class="line sm" id="t4b" style="margin-top:14px"></div>
  </div>
  <!-- 5 portal -->
  <div class="scene" id="s5">
    <div class="portal" id="portal"><div class="r1"></div><div class="r2"></div><div class="core"></div>
      <div class="pfile" id="pfile">▢ foto.jpg</div><div class="recv" id="recv">↓ RECIBIDO</div></div>
    <div class="line" id="t5a" style="margin-top:54px"></div><div class="line sm" id="t5b" style="margin-top:14px"></div>
  </div>
  <!-- 6 three -->
  <div class="scene" id="s6">
    <div class="peers">
      <div class="peer on"><div class="dot"></div><div class="nm">vos</div></div>
      <div class="peer on"><div class="dot"></div><div class="nm">peer</div></div>
      <div class="peer on"><div class="dot"></div><div class="nm">+1</div></div>
    </div>
    <div class="line big" id="t6a"></div><div class="line sm" id="t6b" style="margin-top:16px"></div>
  </div>
  <!-- 7 vanish -->
  <div class="scene" id="s7"><div class="line" id="t7a"></div><div class="line sm" id="t7b" style="margin-top:16px"></div></div>
  <!-- 8 future -->
  <div class="scene" id="s8">
    <div class="line big hl" id="t8"></div>
    <div class="url">hidr4lisk.github.io/warp</div>
    <div class="at">@hidralisk.online</div>
  </div>
  <!-- 9 endcard -->
  <div class="scene" id="s9">
    <div class="markmini">Hidr4lisk_</div>
    <div class="by" id="t9"></div>
    <div class="byname">Federico Furgiuele</div>
  </div>
</div>

<script>
// Escalar el stage a la pantalla (para verlo en celu/PC; en 1080×1920 da escala 1)
function fitStage(){ const s=Math.min(innerWidth/1080, innerHeight/1920); document.getElementById('stage').style.transform='scale('+s+')'; }
addEventListener('resize',fitStage); fitStage();

const LANG = new URLSearchParams(location.search).get('lang') || 'es';
const TXT = {
  es:{ t1:'tus archivos · tu canal · cero rastro',
    t2a:'Mandá lo que sea.', t2b:'Sin apps. Sin cuentas. Sin permiso.',
    t3a:'Generás un canal seguro.', t3b:'Un link. Un QR. Listo.',
    t4a:'Se conectan al instante.', t4b:'Cifrado de punta a punta.',
    t5a:'Lo tirás al portal…', t5b:'…viaja cifrado y aparece del otro lado.',
    t6a:'¿Dos? Tres.', t6b:'Los que quieras. Tu propia red.',
    t7a:'Cerrás. Desaparece.', t7b:'Ni el servidor vio nada.',
    t8:'El futuro es privado.', t9:'Desarrollado por' },
  en:{ t1:'your files · your channel · zero trace',
    t2a:'Send anything.', t2b:'No apps. No accounts. No permission.',
    t3a:'You spin up a secure channel.', t3b:'One link. One QR. Done.',
    t4a:'They connect instantly.', t4b:'End-to-end encrypted.',
    t5a:'Throw it into the portal…', t5b:'…it travels encrypted, out the other side.',
    t6a:'Two? Three.', t6b:'As many as you want. Your own network.',
    t7a:'Close it. Gone.', t7b:'Not even the server saw it.',
    t8:'The future is private.', t9:'Developed by' },
}[LANG];
document.documentElement.lang = LANG;
for (const k in TXT){ const el=document.getElementById(k); if(el) el.textContent=TXT[k]; }
if (LANG==='en'){ document.querySelectorAll('#peers2 .nm')[0].textContent='you';
  document.querySelector('#p2b .nm').textContent='peer';
  document.querySelectorAll('#s6 .nm')[0].textContent='you';
  document.getElementById('pfile').textContent='▢ photo.jpg';
  document.getElementById('recv').textContent='↓ RECEIVED'; }

// ── QR estilizado (grid determinístico con finder squares) ──
(function(){
  const N=21, grid=document.getElementById('qrgrid');
  grid.style.gridTemplateColumns=`repeat(${N},1fr)`;
  const finder=(r,c)=> (r<7&&c<7)||(r<7&&c>=N-7)||(r>=N-7&&c<7);
  let seed=7;
  const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const i=document.createElement('i');
    let on;
    if(finder(r,c)){ const lr=r%7,lc=(c>=N-7?c-(N-7):c)%7; const rr=(r>=N-7?r-(N-7):r)%7;
      const br=(r<7?r:rr), bc=lc; on=(br===0||br===6||bc===0||bc===6||(br>=2&&br<=4&&bc>=2&&bc<=4)); }
    else { on = rnd()>0.5; }
    i.style.background = on ? '#0a0a0a' : 'transparent';
    grid.appendChild(i);
  }
})();

// ── Matrix rain ──
const cv=document.getElementById('rain'),cx=cv.getContext('2d');
cv.width=1080;cv.height=1920;
const FS=24, cols=Math.floor(1080/FS);
let drops=Array.from({length:cols},()=>Math.floor(Math.random()*-60));
const G=[];for(let i=0;i<96;i++)G.push(String.fromCharCode(0x30A0+i));G.push(...'01<>[]{}/$#'.split(''));
let rainAlpha=0.9, raf;
function rain(){
  cx.fillStyle='rgba(5,7,5,.10)';cx.fillRect(0,0,1080,1920);
  cx.font=FS+'px monospace';
  for(let i=0;i<cols;i++){
    const ch=G[Math.floor(Math.random()*G.length)];
    cx.fillStyle=`rgba(57,211,83,${rainAlpha})`;
    cx.fillText(ch,i*FS,drops[i]*FS);
    if(Math.random()>0.985){cx.fillStyle=`rgba(182,255,58,${rainAlpha})`;cx.fillText(ch,i*FS,(drops[i]-1)*FS);}
    if(drops[i]*FS>1920&&Math.random()>0.96)drops[i]=0;drops[i]++;
  }
  raf=requestAnimationFrame(rain);
}
rain();

// ── Timeline ──
const beats=[
  {at:0,    s:'s1', dur:3500, on(){ const wm=document.getElementById('wm'); wm.classList.add('go'); setTimeout(()=>wm.classList.remove('go'),520);} },
  {at:3500, s:'s2', dur:3500},
  {at:7000, s:'s3', dur:4000},
  {at:11000,s:'s4', dur:4000, on(){ setTimeout(()=>{flash();document.getElementById('p2b').classList.add('on');},700);} },
  {at:15000,s:'s5', dur:5000, on(){ const p=document.getElementById('portal'); setTimeout(()=>{p.classList.add('roar');document.getElementById('pfile').classList.add('go');document.getElementById('recv').classList.add('go');},500); setTimeout(()=>p.classList.remove('roar'),3200);} },
  {at:20000,s:'s6', dur:4500, on(){flash();} },
  {at:24500,s:'s7', dur:4500, on(){ // colapso del rain
      let t=0;const iv=setInterval(()=>{rainAlpha=Math.max(0,0.9-(t+=1)/14);if(rainAlpha<=0)clearInterval(iv);},80);} },
  {at:29000,s:'s8', dur:3500, on(){rainAlpha=0.5;} },
  {at:32500,s:'s9', dur:3000},
];
const TOTAL=35500;
function flash(){const f=document.getElementById('flash');f.style.transition='none';f.style.opacity='.5';requestAnimationFrame(()=>{f.style.transition='opacity .4s';f.style.opacity='0';});}
let cur=null;
beats.forEach(b=>{
  setTimeout(()=>{
    if(cur){const p=document.getElementById(cur.s);p.classList.remove('on');p.classList.add('off');}
    const el=document.getElementById(b.s); el.classList.remove('off'); el.classList.add('on');
    cur=b; if(b.on)b.on();
  }, b.at);
});
// progress bar
const prog=document.getElementById('prog');
const t0=performance.now();
(function pb(){const e=performance.now()-t0;prog.style.width=Math.min(100,e/TOTAL*100)+'%';if(e<TOTAL)requestAnimationFrame(pb);})();
window.__reelDone=false; setTimeout(()=>{window.__reelDone=true;}, TOTAL+200);
</script>
</body>
</html>
