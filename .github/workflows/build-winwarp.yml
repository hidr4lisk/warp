name: Build WinWarp

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install paho-mqtt cryptography tkinterdnd2 pyinstaller

      - name: Build exe
        run: |
          cd winwarp
          pyinstaller --collect-all tkinterdnd2 --windowed --onefile --name Hidr4lisk_WARP_windows winwarp.py

      - name: Package zip
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $zip = "Hidr4lisk_WARP_windows_${tag}.zip"
          Copy-Item winwarp/dist/Hidr4lisk_WARP_windows.exe .
          Copy-Item winwarp/README_windows.txt .
          Compress-Archive -Path Hidr4lisk_WARP_windows.exe, README_windows.txt -DestinationPath $zip
          echo "ZIP_NAME=$zip" >> $env:GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
